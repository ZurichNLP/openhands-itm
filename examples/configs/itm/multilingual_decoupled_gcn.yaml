# pretrained: "<path to pretrained checkpoint for test evaluation>"

data:
    modality: "pose"
    train_pipeline:
        dataset:
            _target_: openhands.datasets.isolated.ConcatDataset
            unify_vocabulary: True
            datasets:
                ASLLVDDataset:
                    split_file: "openhands/datasets/assets/asllvd_metadata/train_labels.json"
                    root_dir: "openhands_data/ASLLVD-Skeleton/PKL_POSES"
                    class_mappings_file_path: "openhands/datasets/assets/asllvd_metadata/label_names.txt"
                    normalized_class_mappings_file: "openhands/datasets/assets/asllvd_metadata/normalized_glosses.csv"
                    # only_metadata: True
                AUTSLDataset:
                    split_file: "openhands/datasets/assets/autsl_metadata/AUTSL/train_labels.csv"
                    root_dir: "openhands_data/train_poses/"
                    class_mappings_file_path: "openhands/datasets/assets/autsl_metadata/AUTSL/SignList_ClassId_TR_EN.csv"
                    normalized_class_mappings_file: "openhands/datasets/assets/autsl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                GSLDataset:
                    split_file: "openhands/datasets/assets/gsl_metadata/GSL_split/GSL_isolated/train_greek_iso.csv"
                    root_dir: "openhands_data/GSL/GSL_pose"
                    class_mappings_file_path: "openhands/datasets/assets/gsl_metadata/GSL_split/GSL_isolated/iso_classes.csv"
                    normalized_class_mappings_file: "openhands/datasets/assets/gsl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                INCLUDEDataset:
                    split_file: "openhands/datasets/assets/include_metadata/Train_Test_Split/train_include.csv"
                    root_dir: "openhands_data/INCLUDE/Pose_Signs"
                    normalized_class_mappings_file: "openhands/datasets/assets/include_metadata/normalized_glosses.csv"
                    # only_metadata: True
                LSA64Dataset:
                    root_dir: "openhands_data/LSA64_Cut/pose_all_cut/"
                    class_mappings_file_path: "openhands/datasets/assets/lsa64_metadata/LSA64_Cut/lsa64_signs.md"
                    normalized_class_mappings_file: "openhands/datasets/assets/lsa64_metadata/normalized_glosses.csv"
                    # only_metadata: True
                MSASLDataset:
                    class_mappings_file_path: "openhands/datasets/assets/msasl_metadata/MS_ASL_SI_ASL1000_train.json"
                    root_dir: "openhands_data/MS-ASL/PKL_POSES/train"
                    split_file: "openhands/datasets/assets/msasl_metadata/MS_ASL_SI_ASL1000_train.json"
                    normalized_class_mappings_file: "openhands/datasets/assets/msasl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                RWTH_Phoenix_Signer03_Dataset:
                    split_file: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/RWTH-PHOENIX-Weather-Signer03-cutout.train.corpus"
                    root_dir: "openhands_data/RWTH-PHOENIX-Weather-Signer03-cutout/TRAIN_POSES"
                    class_mappings_file_path: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/RWTH-PHOENIX-Weather-Signer03-cutout.data.corpus"
                    normalized_class_mappings_file: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/normalized_glosses.csv"
                    # only_metadata: True
                WLASLDataset:
                    split_file: "openhands/datasets/assets/wlasl_metadata/splits/asl2000.json"
                    root_dir: "openhands_data/wlasl_poses_pickle"
                    normalized_class_mappings_file: "openhands/datasets/assets/wlasl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                ITMDataset:
                    split_file: "data/itm_data.json"
                    root_dir: "data/openhands_mp_30"
                    normalized_class_mappings_file: "frameworks/openhands/openhands/datasets/assets/itm_metadata/normalized_glosses.csv"
                    # only_metadata: True
            modality: "pose"
            splits: "train"
            multilingual: true

        transforms:
            - TemporalSample:
                num_frames: 64
            - PoseSelect:
                preset: mediapipe_holistic_minimal_27
            - CenterAndScaleNormalize:
                reference_points_preset: shoulder_mediapipe_holistic_minimal_27
            - ShearTransform:
                shear_std: 0.1
            - RotatationTransform:
                rotation_std: 0.1
            - PrependLangCodeOHE:
                lang_codes:
                    - aed # Argentinian
                    - ase # American
                    - gsg # German
                    - gss # Greek
                    - ins # Indian
                    - tsm # Turkish
                    - icl # Icelandic

        dataloader:
            _target_: torch.utils.data.DataLoader
            batch_size: 64
            shuffle: true
            num_workers: 8
            pin_memory: true
            drop_last: false

    valid_pipeline:
        dataset:
            _target_: openhands.datasets.isolated.ConcatDataset
            unify_vocabulary: True
            datasets:
                ASLLVDDataset:
                    split_file: "openhands/datasets/assets/asllvd_metadata/test_labels.json"
                    root_dir: "openhands_data/ASLLVD-Skeleton/PKL_POSES"
                    class_mappings_file_path: "openhands/datasets/assets/asllvd_metadata/label_names.txt"
                    normalized_class_mappings_file: "openhands/datasets/assets/asllvd_metadata/normalized_glosses.csv"
                    # only_metadata: True
                AUTSLDataset:
                    split_file: "openhands/datasets/assets/autsl_metadata/AUTSL/validation_labels.csv"
                    root_dir: "openhands_data/val_poses/"
                    class_mappings_file_path: "openhands/datasets/assets/autsl_metadata/AUTSL/SignList_ClassId_TR_EN.csv"
                    normalized_class_mappings_file: "openhands/datasets/assets/autsl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                GSLDataset:
                    split_file: "openhands/datasets/assets/gsl_metadata/GSL_split/GSL_isolated/val_greek_iso.csv"
                    root_dir: "openhands_data/GSL/GSL_pose"
                    class_mappings_file_path: "openhands/datasets/assets/gsl_metadata/GSL_split/GSL_isolated/iso_classes.csv"
                    normalized_class_mappings_file: "openhands/datasets/assets/gsl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                INCLUDEDataset:
                    split_file: "openhands/datasets/assets/include_metadata/Train_Test_Split/test_include.csv"
                    root_dir: "openhands_data/INCLUDE/Pose_Signs"
                    normalized_class_mappings_file: "openhands/datasets/assets/include_metadata/normalized_glosses.csv"
                    # only_metadata: True
                LSA64Dataset:
                    root_dir: "openhands_data/LSA64_Cut/pose_all_cut/"
                    class_mappings_file_path: "openhands/datasets/assets/lsa64_metadata/LSA64_Cut/lsa64_signs.md"
                    normalized_class_mappings_file: "openhands/datasets/assets/lsa64_metadata/normalized_glosses.csv"
                    # only_metadata: True
                MSASLDataset:
                    class_mappings_file_path: "openhands/datasets/assets/msasl_metadata/MS_ASL_SI_ASL1000_train.json"
                    root_dir: "openhands_data/MS-ASL/PKL_POSES/valid"
                    split_file: "openhands/datasets/assets/msasl_metadata/MS_ASL_SI_ASL1000_val.json"
                    normalized_class_mappings_file: "openhands/datasets/assets/msasl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                RWTH_Phoenix_Signer03_Dataset:
                    split_file: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/RWTH-PHOENIX-Weather-Signer03-cutout.test.corpus"
                    root_dir: "openhands_data/RWTH-PHOENIX-Weather-Signer03-cutout/TEST_POSES"
                    class_mappings_file_path: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/RWTH-PHOENIX-Weather-Signer03-cutout.data.corpus"
                    normalized_class_mappings_file: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/normalized_glosses.csv"
                    # only_metadata: True
                WLASLDataset:
                    split_file: "openhands/datasets/assets/wlasl_metadata/splits/asl2000.json"
                    root_dir: "openhands_data/wlasl_poses_pickle"
                    normalized_class_mappings_file: "openhands/datasets/assets/wlasl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                ITMDataset:
                    split_file: "data/itm_data.json"
                    root_dir: "data/openhands_mp_30"
                    normalized_class_mappings_file: "frameworks/openhands/openhands/datasets/assets/itm_metadata/normalized_glosses.csv"
                    # only_metadata: True
            modality: "pose"
            splits: "val"
            multilingual: true

        transforms:
            - TemporalSample:
                num_frames: 64
                subsample_mode: 0
            - PoseSelect:
                preset: mediapipe_holistic_minimal_27
            - CenterAndScaleNormalize:
                reference_points_preset: shoulder_mediapipe_holistic_minimal_27
            - PrependLangCodeOHE:
                lang_codes:
                    - aed # Argentinian
                    - ase # American
                    - gsg # German
                    - gss # Greek
                    - ins # Indian
                    - tsm # Turkish
                    - icl # Icelandic

        dataloader:
            _target_: torch.utils.data.DataLoader
            batch_size: 64
            shuffle: false
            num_workers: 6
            pin_memory: true
            drop_last: false

    test_pipeline:
        dataset:
            _target_: openhands.datasets.isolated.ConcatDataset
            unify_vocabulary: True
            datasets:
                ASLLVDDataset:
                    split_file: "openhands/datasets/assets/asllvd_metadata/test_labels.json"
                    root_dir: "openhands_data/ASLLVD-Skeleton/PKL_POSES"
                    class_mappings_file_path: "openhands/datasets/assets/asllvd_metadata/label_names.txt"
                    normalized_class_mappings_file: "openhands/datasets/assets/asllvd_metadata/normalized_glosses.csv"
                    # only_metadata: True
                AUTSLDataset:
                    split_file: "openhands/datasets/assets/autsl_metadata/AUTSL/test_labels.csv"
                    root_dir: "openhands_data/test_poses/"
                    class_mappings_file_path: "openhands/datasets/assets/autsl_metadata/AUTSL/SignList_ClassId_TR_EN.csv"
                    normalized_class_mappings_file: "openhands/datasets/assets/autsl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                GSLDataset:
                    split_file: "openhands/datasets/assets/gsl_metadata/GSL_split/GSL_isolated/test_greek_iso.csv"
                    root_dir: "openhands_data/GSL/GSL_pose"
                    class_mappings_file_path: "openhands/datasets/assets/gsl_metadata/GSL_split/GSL_isolated/iso_classes.csv"
                    normalized_class_mappings_file: "openhands/datasets/assets/gsl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                INCLUDEDataset:
                    split_file: "openhands/datasets/assets/include_metadata/Train_Test_Split/test_include.csv"
                    root_dir: "openhands_data/INCLUDE/Pose_Signs"
                    normalized_class_mappings_file: "openhands/datasets/assets/include_metadata/normalized_glosses.csv"
                    # only_metadata: True
                LSA64Dataset:
                    root_dir: "openhands_data/LSA64_Cut/pose_all_cut/"
                    class_mappings_file_path: "openhands/datasets/assets/lsa64_metadata/LSA64_Cut/lsa64_signs.md"
                    normalized_class_mappings_file: "openhands/datasets/assets/lsa64_metadata/normalized_glosses.csv"
                    # only_metadata: True
                MSASLDataset:
                    class_mappings_file_path: "openhands/datasets/assets/msasl_metadata/MS_ASL_SI_ASL1000_train.json"
                    root_dir: "openhands_data/MS-ASL/PKL_POSES/test"
                    split_file: "openhands/datasets/assets/msasl_metadata/MS_ASL_SI_ASL1000_test.json"
                    normalized_class_mappings_file: "openhands/datasets/assets/msasl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                RWTH_Phoenix_Signer03_Dataset:
                    split_file: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/RWTH-PHOENIX-Weather-Signer03-cutout.test.corpus"
                    root_dir: "openhands_data/RWTH-PHOENIX-Weather-Signer03-cutout/TEST_POSES"
                    class_mappings_file_path: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/RWTH-PHOENIX-Weather-Signer03-cutout.train.corpus"
                    normalized_class_mappings_file: "openhands/datasets/assets/rwth_phoenix_weather_signer03_cutout_metadata/normalized_glosses.csv"
                    # only_metadata: True
                WLASLDataset:
                    split_file: "openhands/datasets/assets/wlasl_metadata/splits/asl2000.json"
                    root_dir: "openhands_data/wlasl_poses_pickle"
                    normalized_class_mappings_file: "openhands/datasets/assets/wlasl_metadata/normalized_glosses.csv"
                    # only_metadata: True
                ITMDataset:
                    split_file: "data/itm_data.json"
                    root_dir: "data/openhands_mp_30"
                    normalized_class_mappings_file: "frameworks/openhands/openhands/datasets/assets/itm_metadata/normalized_glosses.csv"
                    # only_metadata: True
            modality: "pose"
            splits: "test"
            inference_mode: false
            multilingual: true

        transforms:
            - TemporalSample:
                num_frames: 64
                subsample_mode: 0
            - PoseSelect:
                preset: mediapipe_holistic_minimal_27
            - CenterAndScaleNormalize:
                reference_points_preset: shoulder_mediapipe_holistic_minimal_27
            - PrependLangCodeOHE:
                lang_codes:
                    - aed # Argentinian
                    - ase # American
                    - gsg # German
                    - gss # Greek
                    - ins # Indian
                    - tsm # Turkish
                    - icl # Icelandic

        dataloader:
            _target_: torch.utils.data.DataLoader
            batch_size: 64
            shuffle: false
            num_workers: 8
            pin_memory: true
            drop_last: false

model:
    encoder:
        type: decoupled-gcn
        params:
            graph_args:
                num_nodes: 27
                inward_edges:
                    [
                        [2, 0],
                        [1, 0],
                        [0, 3],
                        [0, 4],
                        [3, 5],
                        [4, 6],
                        [5, 7],
                        [6, 17],
                        [7, 8],
                        [7, 9],
                        [9, 10],
                        [7, 11],
                        [11, 12],
                        [7, 13],
                        [13, 14],
                        [7, 15],
                        [15, 16],
                        [17, 18],
                        [17, 19],
                        [19, 20],
                        [17, 21],
                        [21, 22],
                        [17, 23],
                        [23, 24],
                        [17, 25],
                        [25, 26],
                    ]
    decoder:
        type: fc
        params:
            dropout_ratio: 0.1

optim:
    loss: "CrossEntropyLoss"
    optimizer:
        name: Adam
        params:
            lr: 1e-3

    scheduler:
        name: CosineAnnealingLR
        params:
            last_epoch: -1
            T_max: 10

trainer:
    gpus: 1
    max_epochs: 200
    # resume_from_checkpoint: "/home/gokulnc/SLR/experiments/multilingual/unified_vocab/decoupled_gcn_6_langs/epoch=169-step=454069.ckpt"

exp_manager:
    create_tensorboard_logger: true
    create_wandb_logger: false
    wandb_logger_kwargs:
        name: null
        project: null

    create_checkpoint_callback: true
    checkpoint_callback_params:
        monitor: "val_acc"
        mode: "max"
        save_top_k: 3
        dirpath: "experiments/multilingual/unified_vocab/sl_gcn_6_langs/"
        save_last: true

    early_stopping_callback: true
    early_stopping_params:
        monitor: "val_acc"
        patience: 30
        verbose: true
        mode: "max"
